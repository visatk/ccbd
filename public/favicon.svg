<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-glow)" />
  
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.75" />
    <circle cx="0" cy="0" r="1.5" fill="#374151" />
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g transform="translate(400, 240)">
    <path d="M 0 -130 L 110 -85 L 110 25 C 110 90 55 145 0 180 C -55 145 -110 90 -110 25 L -110 -85 Z" 
          fill="#050b14" stroke="url(#shield-grad)" stroke-width="8" stroke-linejoin="round" />
    
    <path d="M 0 -105 L 85 -70 L 85 15 C 85 65 40 110 0 140 C -40 110 -85 65 -85 15 L -85 -70 Z" 
          fill="rgba(0, 240, 255, 0.03)" stroke="#00F0FF" stroke-width="2" stroke-dasharray="6 6" opacity="0.7"/>

    <g filter="url(#neon-glow)">
      <path d="M -25 -35 L -60 0 L -25 35" fill="none" stroke="#39FF14" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 15 45 L -15 -45" fill="none" stroke="#39FF14" stroke-width="12" stroke-linecap="round" />
      <path d="M 25 -35 L 60 0 L 25 35" fill="none" stroke="#39FF14" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    
    <path d="M -30 -130 L 30 -130" fill="none" stroke="#00F0FF" stroke-width="12" stroke-linecap="round" />
  </g>

  <g transform="translate(400, 485)" text-anchor="middle" font-family="'Courier New', Courier, monospace">
    <text x="0" y="0" fill="#FFFFFF" font-size="48" font-weight="900" letter-spacing="10">
      CYBER<tspan fill="#00F0FF">CODER</tspan>
    </text>
    
    <text x="0" y="35" fill="#39FF14" font-size="16" font-weight="bold" letter-spacing="6">
      [ BD ]
    </text>
  </g>
</svg>
