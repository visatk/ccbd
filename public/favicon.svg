<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#030712" />
    </radialGradient>
    
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#39FF14" />
    </linearGradient>

    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-glow)" />
  
  <pattern id="hex" width="56.6" height="100" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
    <path d="M 28.3 0 L 56.6 16.6 L 56.6 50 L 28.3 66.6 L 0 50 L 0 16.6 Z" fill="none" stroke="#1f2937" stroke-width="0.75"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#hex)" />

  <g transform="translate(400, 300)">
    
    <path d="M 0 -130 L 110 -85 L 110 25 C 110 90 55 145 0 180 C -55 145 -110 90 -110 25 L -110 -85 Z" 
          fill="#050b14" stroke="url(#shield-grad)" stroke-width="10" stroke-linejoin="round" />
    
    <path d="M 0 -105 L 85 -70 L 85 15 C 85 65 40 110 0 140 C -40 110 -85 65 -85 15 L -85 -70 Z" 
          fill="rgba(0, 240, 255, 0.03)" stroke="#00F0FF" stroke-width="2" stroke-dasharray="8 8" opacity="0.6"/>

    <g filter="url(#neon-glow)">
      <path d="M -30 -35 L -65 0 L -30 35 M 30 -35 L 65 0 L 30 35 M 20 45 L -20 -45" 
            fill="none" stroke="#39FF14" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 20 45 L -20 -45" fill="none" stroke="#FF0000" stroke-width="1.5" opacity="0.4" />
    </g>
    
    <g transform="translate(0, 110)">
      <path d="M -20 -10 C -20 -10, -35 -10, -35 0 C -35 10, -20 10, -20 10 L 0 10 C 20 10, 35 10, 35 0 C 35 -10, 20 -10, 20 -10 L 0 -10 Z" 
            fill="none" stroke="#00F0FF" stroke-width="3" stroke-dasharray="5 5" opacity="0.7"/>
      <circle cx="-35" cy="0" r="3" fill="#00F0FF" />
      <circle cx="35" cy="0" r="3" fill="#00F0FF" />
    </g>
  </g>
</svg>
